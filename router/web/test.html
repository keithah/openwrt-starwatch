<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Starwatch logic tests</title></head>
<body>
<h1>Starwatch browser logic tests</h1>
<pre id="results">Running…</pre>
<script type="module">
import {
  deriveState, availabilityValue, localMinutesToUTC, utcMinutesToLocal,
  friendlyModel, hasMotors, assembleSeries, outageBarLayout,
  normalizeCardPreferences, visibleCardOrder, clientMutationPayload,
  clientMutationShouldRetry,
} from './logic.js';
import {axisTickLabels, chartStructureKey, mountChart} from './charts.js';
import {APIError} from './api.js';
import {h, render} from './vendor/preact.module.js';
import {ClientManagement} from './cards.js';

const results = [];
const assert = (name, condition) => {
  if (!condition) throw new Error(name);
  results.push(`✓ ${name}`);
};

try {
  assert('WAN-only topology wins', deriveState({topology: 'wan-only'}) === 'WAN-only');
  assert('unreachable full topology', deriveState({topology: 'full', dish_reachable: false}) === 'Unreachable');
  assert('searching outage', deriveState({topology: 'full', dish_reachable: true, dish: {outage: {cause: 'NO_DOWNLINK'}}}) === 'Searching');
  assert('obstruction state', deriveState({topology: 'full', dish_reachable: true, dish: {obstruction: {currently_obstructed: true}}}) === 'Obstructed');
  assert('online state', deriveState({topology: 'full', dish_reachable: true, dish: {}}) === 'Online');
  assert('zero remains available', availabilityValue(0, {available: true}).available === true);
  assert('reason is retained', availabilityValue(3, {available: false, reason: 'not on this dish'}).reason === 'not on this dish');
  assert('local to UTC wraps', localMinutesToUTC(30, -120) === 1350);
  assert('UTC to local wraps', utcMinutesToLocal(1350, -120) === 30);
  assert('known model gets friendly name', friendlyModel('rev_mini_prod1').includes('Mini'));
  assert('Mini panda model gets friendly name', friendlyModel('mini1_panda_prod1') === 'Starlink Mini');
  assert('Mini panda model is motorless', hasMotors('mini1_panda_prod1') === false);
  assert('unknown model remains raw', friendlyModel('future_dish') === 'future_dish');
  const aligned = assembleSeries([
    {series: 'a', tier: 'ram', points: [{time: '2026-01-01T00:00:00Z', value: 1}, {time: '2026-01-01T00:00:02Z', value: 3}]},
    {series: 'b', tier: 'minute', points: [{time: '2026-01-01T00:00:01Z', value: 2, min: 1, max: 4}]},
  ]);
  assert('series timestamps align', aligned.timestamps.length === 3 && aligned.series[0].values[1] === null);
  assert('aggregate envelope survives', aligned.series[1].min[1] === 1 && aligned.series[1].max[1] === 4);
  assert('throughput ticks use rate units', axisTickLabels('throughput', [250000000])[0] === '250.0 Mb/s');
  assert('latency ticks use milliseconds', axisTickLabels('latency', [42.5])[0] === '42.5 ms');
  assert('loss ticks use percentages', axisTickLabels('loss', [.125])[0] === '12.5%');
  assert('power ticks use watts', axisTickLabels('power', [57.25])[0] === '57.3 W');
  const sameShape = {...aligned, timestamps: [...aligned.timestamps, aligned.timestamps.at(-1) + 1]};
  sameShape.series = aligned.series.map(item => ({...item, values: [...item.values, 4], min: [...item.min, null], max: [...item.max, null]}));
  assert('data-only updates retain chart structure', chartStructureKey(aligned, 'throughput') === chartStructureKey(sameShape, 'throughput'));
  assert('tab changes alter chart structure', chartStructureKey(aligned, 'throughput') !== chartStructureKey(aligned, 'latency'));
  const chartHost = document.createElement('div');
  chartHost.style.width = '800px';
  document.body.append(chartHost);
  const chart = mountChart(chartHost, aligned, {kind: 'throughput'});
  const plotElement = chartHost.querySelector('.uplot');
  assert('data-only chart update uses setData', chart.update(sameShape, {kind: 'throughput'}) && chartHost.querySelector('.uplot') === plotElement);
  assert('tab change requests chart rebuild', chart.update(sameShape, {kind: 'latency'}) === false);
  chart.destroy();
  chartHost.remove();
  const shortOutage = outageBarLayout({start: '2026-01-30T23:59:15Z', duration: 45e9}, Date.parse('2026-01-31T00:00:00Z'), 30 * 86400);
  assert('short outage bars retain minimum visibility', shortOutage.widthPercent >= .4);
  const cards = [
    {id: 'live', available: true}, {id: 'power', available: true},
    {id: 'router', available: true}, {id: 'alignment', available: false},
  ];
  const savedCards = {order: ['power', 'old-card', 'live'], hidden: {power: true, 'old-card': true}};
  const preferences = normalizeCardPreferences(cards, savedCards);
  assert('saved card order is retained and new cards append', preferences.order.join(',') === 'power,live,router,alignment');
  assert('unknown card ids are pruned', !preferences.order.includes('old-card') && !('old-card' in preferences.hidden));
  assert('hidden card preferences are retained', preferences.hidden.power === true);
  assert('data absence wins over card visibility preferences', visibleCardOrder(cards, preferences).join(',') === 'live,router');
  assert('reset restores default ordered visible cards', visibleCardOrder(cards, normalizeCardPreferences(cards, null)).join(',') === 'live,power,router');
  const renamePayload = clientMutationPayload({configRevision: 'incarnation:19', givenName: 'Work Mac'});
  assert('rename payload carries the current revision and typed confirmation', renamePayload.config_revision === 'incarnation:19' && renamePayload.confirmation === 'RENAME CLIENT' && renamePayload.given_name === 'Work Mac');
  const blockPayload = clientMutationPayload({configRevision: 'incarnation:20', blocked: true});
  assert('block payload carries typed confirmation and boolean state', blockPayload.config_revision === 'incarnation:20' && blockPayload.confirmation === 'BLOCK CLIENT' && blockPayload.blocked === true);
  const unblockPayload = clientMutationPayload({configRevision: 'incarnation:21', blocked: false});
  assert('unblock payload carries typed confirmation and boolean state', unblockPayload.confirmation === 'UNBLOCK CLIENT' && unblockPayload.blocked === false);
  assert('only a stale revision requests refresh and retry', clientMutationShouldRetry({status: 409}) === true && clientMutationShouldRetry({status: 422}) === false);
  const clientHost = document.createElement('div');
  document.body.append(clientHost);
  render(h(ClientManagement, {router: null, onMutate: async () => {}}), clientHost);
  assert('client management card is omitted without router data', !clientHost.querySelector('.client-management-card'));
  const routerFixture = {config_revision: 'incarnation:44', clients: [{
    mac: 'aa:bb:cc:dd:ee:ff', name: 'Fixture client', given_name: '', ipv4: '192.168.1.7',
    interface_name: 'wlan0', mode: '802.11ac', active: true, blocked: false,
    signal_dbm: -52, snr_db: 31, associated_seconds: 120, rx: {rate_mbps: 200}, tx: {rate_mbps: 100},
  }]};
  render(h(ClientManagement, {router: routerFixture, onMutate: async () => {}}), clientHost);
  const managementText = clientHost.textContent.toLowerCase();
  assert('client management renders no password input or credential text', !clientHost.querySelector('input[type="password"]') && !managementText.includes('passphrase') && !managementText.includes('credential'));
  const blockTrigger = [...clientHost.querySelectorAll('button')].find(button => button.textContent === 'Block');
  blockTrigger.focus();
  blockTrigger.click();
  await new Promise(resolve => requestAnimationFrame(resolve));
  const dialog = document.querySelector('.client-confirm');
  const confirmationInput = dialog.querySelector('input');
  const dialogButtons = [...dialog.querySelectorAll('button')];
  assert('block dialog moves focus to the typed confirmation input', document.activeElement === confirmationInput);
  confirmationInput.focus();
  dialog.dispatchEvent(new KeyboardEvent('keydown', {key: 'Tab', shiftKey: true, bubbles: true}));
  assert('shift-tab wraps from dialog input to the last dialog control', document.activeElement === dialogButtons.at(-1));
  dialog.dispatchEvent(new KeyboardEvent('keydown', {key: 'Tab', bubbles: true}));
  assert('tab wraps from the last dialog control to the confirmation input', document.activeElement === confirmationInput);
  dialogButtons[0].click();
  await new Promise(resolve => setTimeout(resolve, 0));
  const liveError = document.querySelector('.client-confirm [role="status"][aria-live="polite"]');
  assert('typed-confirmation error is announced inside the dialog', !!liveError && liveError.textContent.includes('BLOCK CLIENT'));
  document.querySelector('.client-confirm').dispatchEvent(new KeyboardEvent('keydown', {key: 'Escape', bubbles: true}));
  await new Promise(resolve => setTimeout(resolve, 10));
  const restoredBlockTrigger = clientHost.querySelector('[data-client-block]');
  assert('escape closes the dialog and restores the invoking trigger', !document.querySelector('.client-confirm') && document.activeElement === restoredBlockTrigger);
  render(null, clientHost);
  const unsupportedReason = 'user-managed block schedule exists';
  render(h(ClientManagement, {router: routerFixture, onMutate: async () => { throw new APIError(unsupportedReason, 422); }}), clientHost);
  clientHost.querySelector('[data-client-block]').click();
  await new Promise(resolve => setTimeout(resolve, 0));
  const unsupportedDialog = document.querySelector('.client-confirm');
  const unsupportedInput = unsupportedDialog.querySelector('input');
  unsupportedInput.value = 'BLOCK CLIENT';
  unsupportedInput.dispatchEvent(new Event('input', {bubbles: true}));
  await new Promise(resolve => setTimeout(resolve, 0));
  unsupportedDialog.querySelector('button').click();
  await new Promise(resolve => setTimeout(resolve, 0));
  const unsupportedStatus = document.querySelector('.client-confirm [role="status"][aria-live="polite"]');
  assert('422 firmware or user-managed reason is shown verbatim in-dialog', unsupportedStatus?.textContent === unsupportedReason);
  render(null, clientHost);
  clientHost.remove();
  document.querySelector('#results').textContent = `${results.join('\n')}\n\n${results.length} assertions passed.`;
  document.body.dataset.result = 'pass';
} catch (error) {
  document.querySelector('#results').textContent = `✗ ${error.message}`;
  document.body.dataset.result = 'fail';
  throw error;
}
</script>
</body>
</html>
