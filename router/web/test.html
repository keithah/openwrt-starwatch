<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Starwatch logic tests</title></head>
<body>
<h1>Starwatch browser logic tests</h1>
<pre id="results">Running…</pre>
<script type="module">
import {
  deriveState, availabilityValue, localMinutesToUTC, utcMinutesToLocal,
  friendlyModel, hasMotors, assembleSeries, outageBarLayout,
  normalizeCardPreferences, visibleCardOrder,
} from './logic.js';
import {axisTickLabels, chartStructureKey, mountChart} from './charts.js';

const results = [];
const assert = (name, condition) => {
  if (!condition) throw new Error(name);
  results.push(`✓ ${name}`);
};

try {
  assert('WAN-only topology wins', deriveState({topology: 'wan-only'}) === 'WAN-only');
  assert('unreachable full topology', deriveState({topology: 'full', dish_reachable: false}) === 'Unreachable');
  assert('searching outage', deriveState({topology: 'full', dish_reachable: true, dish: {outage: {cause: 'NO_DOWNLINK'}}}) === 'Searching');
  assert('obstruction state', deriveState({topology: 'full', dish_reachable: true, dish: {obstruction: {currently_obstructed: true}}}) === 'Obstructed');
  assert('online state', deriveState({topology: 'full', dish_reachable: true, dish: {}}) === 'Online');
  assert('zero remains available', availabilityValue(0, {available: true}).available === true);
  assert('reason is retained', availabilityValue(3, {available: false, reason: 'not on this dish'}).reason === 'not on this dish');
  assert('local to UTC wraps', localMinutesToUTC(30, -120) === 1350);
  assert('UTC to local wraps', utcMinutesToLocal(1350, -120) === 30);
  assert('known model gets friendly name', friendlyModel('rev_mini_prod1').includes('Mini'));
  assert('Mini panda model gets friendly name', friendlyModel('mini1_panda_prod1') === 'Starlink Mini');
  assert('Mini panda model is motorless', hasMotors('mini1_panda_prod1') === false);
  assert('unknown model remains raw', friendlyModel('future_dish') === 'future_dish');
  const aligned = assembleSeries([
    {series: 'a', tier: 'ram', points: [{time: '2026-01-01T00:00:00Z', value: 1}, {time: '2026-01-01T00:00:02Z', value: 3}]},
    {series: 'b', tier: 'minute', points: [{time: '2026-01-01T00:00:01Z', value: 2, min: 1, max: 4}]},
  ]);
  assert('series timestamps align', aligned.timestamps.length === 3 && aligned.series[0].values[1] === null);
  assert('aggregate envelope survives', aligned.series[1].min[1] === 1 && aligned.series[1].max[1] === 4);
  assert('throughput ticks use rate units', axisTickLabels('throughput', [250000000])[0] === '250.0 Mb/s');
  assert('latency ticks use milliseconds', axisTickLabels('latency', [42.5])[0] === '42.5 ms');
  assert('loss ticks use percentages', axisTickLabels('loss', [.125])[0] === '12.5%');
  assert('power ticks use watts', axisTickLabels('power', [57.25])[0] === '57.3 W');
  const sameShape = {...aligned, timestamps: [...aligned.timestamps, aligned.timestamps.at(-1) + 1]};
  sameShape.series = aligned.series.map(item => ({...item, values: [...item.values, 4], min: [...item.min, null], max: [...item.max, null]}));
  assert('data-only updates retain chart structure', chartStructureKey(aligned, 'throughput') === chartStructureKey(sameShape, 'throughput'));
  assert('tab changes alter chart structure', chartStructureKey(aligned, 'throughput') !== chartStructureKey(aligned, 'latency'));
  const chartHost = document.createElement('div');
  chartHost.style.width = '800px';
  document.body.append(chartHost);
  const chart = mountChart(chartHost, aligned, {kind: 'throughput'});
  const plotElement = chartHost.querySelector('.uplot');
  assert('data-only chart update uses setData', chart.update(sameShape, {kind: 'throughput'}) && chartHost.querySelector('.uplot') === plotElement);
  assert('tab change requests chart rebuild', chart.update(sameShape, {kind: 'latency'}) === false);
  chart.destroy();
  chartHost.remove();
  const shortOutage = outageBarLayout({start: '2026-01-30T23:59:15Z', duration: 45e9}, Date.parse('2026-01-31T00:00:00Z'), 30 * 86400);
  assert('short outage bars retain minimum visibility', shortOutage.widthPercent >= .4);
  const cards = [
    {id: 'live', available: true}, {id: 'power', available: true},
    {id: 'router', available: true}, {id: 'alignment', available: false},
  ];
  const savedCards = {order: ['power', 'old-card', 'live'], hidden: {power: true, old-card: true}};
  const preferences = normalizeCardPreferences(cards, savedCards);
  assert('saved card order is retained and new cards append', preferences.order.join(',') === 'power,live,router,alignment');
  assert('unknown card ids are pruned', !preferences.order.includes('old-card') && !('old-card' in preferences.hidden));
  assert('hidden card preferences are retained', preferences.hidden.power === true);
  assert('data absence wins over card visibility preferences', visibleCardOrder(cards, preferences).join(',') === 'live,router');
  assert('reset restores default ordered visible cards', visibleCardOrder(cards, normalizeCardPreferences(cards, null)).join(',') === 'live,power,router');
  document.querySelector('#results').textContent = `${results.join('\n')}\n\n${results.length} assertions passed.`;
  document.body.dataset.result = 'pass';
} catch (error) {
  document.querySelector('#results').textContent = `✗ ${error.message}`;
  document.body.dataset.result = 'fail';
  throw error;
}
</script>
</body>
</html>
