name: Publish opkg feed

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go test -race ./...
        working-directory: router
      - run: go vet ./...
        working-directory: router
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./...
        working-directory: router
      - run: make -C package test feed-artifact
      - name: Sign deployable opkg feed
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          STARWATCH_USIGN_PRIVATE_KEY: ${{ secrets.STARWATCH_USIGN_PRIVATE_KEY }}
        run: |
          test -n "$STARWATCH_USIGN_PRIVATE_KEY"
          git init "$RUNNER_TEMP/usign-src"
          git -C "$RUNNER_TEMP/usign-src" remote add origin https://git.openwrt.org/project/usign.git
          git -C "$RUNNER_TEMP/usign-src" fetch --depth 1 origin c4c72b1b07945ee192361dc751291a7c98d6adcd
          git -C "$RUNNER_TEMP/usign-src" checkout --detach FETCH_HEAD
          cmake -S "$RUNNER_TEMP/usign-src" -B "$RUNNER_TEMP/usign-build"
          cmake --build "$RUNNER_TEMP/usign-build"
          printf '%s\n' "$STARWATCH_USIGN_PRIVATE_KEY" > "$RUNNER_TEMP/starwatch-feed.sec"
          make -C package signed-feed-artifact \
            USIGN="$RUNNER_TEMP/usign-build/usign" \
            SIGNING_KEY="$RUNNER_TEMP/starwatch-feed.sec"
      - uses: actions/upload-pages-artifact@v3
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          path: package/out/pages

  deploy:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
