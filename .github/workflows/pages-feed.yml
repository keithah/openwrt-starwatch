name: Publish opkg feed

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: keithah/openwrt-wattline
          path: wattline-source
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go test -race ./...
        working-directory: router
      - run: go vet ./...
        working-directory: router
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./...
        working-directory: router
      - run: make -C package test feed-artifact
      - name: Assemble shared Keith OpenWrt feed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release download --repo keithah/openwrt-wattline \
            --pattern '*.ipk' --dir package/out/pages --clobber
          cp wattline-source/package/install.sh package/out/pages/install-wattline.sh
          sh package/mkfeed.sh package/out/pages
          touch package/out/pages/.nojekyll
      - name: Sign deployable opkg feed
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        env:
          STARWATCH_USIGN_PRIVATE_KEY: ${{ secrets.STARWATCH_USIGN_PRIVATE_KEY }}
        run: |
          test -n "$STARWATCH_USIGN_PRIVATE_KEY"
          git init "$RUNNER_TEMP/usign-src"
          git -C "$RUNNER_TEMP/usign-src" remote add origin https://git.openwrt.org/project/usign.git
          git -C "$RUNNER_TEMP/usign-src" fetch --depth 1 origin c4c72b1b07945ee192361dc751291a7c98d6adcd
          git -C "$RUNNER_TEMP/usign-src" checkout --detach FETCH_HEAD
          cmake -S "$RUNNER_TEMP/usign-src" -B "$RUNNER_TEMP/usign-build"
          cmake --build "$RUNNER_TEMP/usign-build"
          printf '%s\n' "$STARWATCH_USIGN_PRIVATE_KEY" > "$RUNNER_TEMP/keithah-feed.sec"
          SIGN_KEY="$RUNNER_TEMP/keithah-feed.sec" \
            USIGN="$RUNNER_TEMP/usign-build/usign" \
            sh package/mkfeed.sh package/out/pages
          cp package/starwatch-feed.pub package/out/pages/keithah-feed.pub
          "$RUNNER_TEMP/usign-build/usign" -V \
            -m package/out/pages/Packages \
            -p package/out/pages/keithah-feed.pub \
            -x package/out/pages/Packages.sig
      - uses: actions/upload-pages-artifact@v5
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        with:
          path: package/out/pages

  deploy:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
