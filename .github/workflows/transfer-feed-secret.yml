name: Transfer feed signing secret

on:
  workflow_dispatch:

permissions: {}

jobs:
  encrypt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25.12"
          cache: false
      - name: Build sealed-box encryptor
        run: |
          set -eu
          work="$RUNNER_TEMP/feed-secret-transfer"
          umask 077
          mkdir "$work"
          cd "$work"
          go mod init feed-secret-transfer
          go get golang.org/x/crypto@v0.41.0
          cat > main.go <<'EOF'
          package main

          import (
          	"crypto/rand"
          	"encoding/base64"
          	"fmt"
          	"io"
          	"os"

          	"golang.org/x/crypto/nacl/box"
          )

          const maxSecretBytes = 48 * 1024

          func main() {
          	if len(os.Args) != 2 {
          		panic("expected target public key")
          	}
          	decoded, err := base64.StdEncoding.DecodeString(os.Args[1])
          	if err != nil || len(decoded) != 32 {
          		panic("invalid target public key")
          	}
          	var publicKey [32]byte
          	copy(publicKey[:], decoded)

          	plaintext, err := io.ReadAll(io.LimitReader(os.Stdin, maxSecretBytes+1))
          	if err != nil || len(plaintext) == 0 || len(plaintext) > maxSecretBytes {
          		panic("invalid source secret")
          	}
          	sealed, err := box.SealAnonymous(nil, plaintext, &publicKey, rand.Reader)
          	if err != nil {
          		panic("could not encrypt source secret")
          	}
          	fmt.Print(base64.StdEncoding.EncodeToString(sealed))
          }
          EOF
          go mod tidy
          go build -trimpath -o "$RUNNER_TEMP/seal-feed-secret" .
      - name: Encrypt existing signing secret
        env:
          SOURCE_SECRET: ${{ secrets.STARWATCH_USIGN_PRIVATE_KEY }}
          TARGET_PUBLIC_KEY: 2UPHcmLwTSz/t+fz6wq2cZp149o1KYl09k5OSdeJBV4=
        run: |
          set -eu
          test -n "$SOURCE_SECRET"
          umask 077
          printf '%s' "$SOURCE_SECRET" |
            "$RUNNER_TEMP/seal-feed-secret" "$TARGET_PUBLIC_KEY" > "$RUNNER_TEMP/encrypted-value"
          test -s "$RUNNER_TEMP/encrypted-value"
      - name: Upload encrypted value
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: encrypted-feed-secret
          path: ${{ runner.temp }}/encrypted-value
          if-no-files-found: error
          retention-days: 1
